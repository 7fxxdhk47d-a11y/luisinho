<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flashcards — Processos de Fabrico II</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d; --text: #c9d1d9; --text-bright: #f0f6fc; --text-muted: #8b949e; }
  body { font-family: 'EB Garamond', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #161b22 0%, #1a1f2b 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border); padding: 28px 24px; display: flex; align-items: center; gap: 16px;
  }
  .back { color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.15s; }
  .back:hover { color: var(--text-bright); }
  header h1 { font-size: 22px; font-weight: 700; color: var(--text-bright); }
  header p { font-size: 13px; color: var(--text-muted); font-style: italic; margin-top: 2px; }
  .coming-soon {
    max-width: 400px; margin: 80px auto; text-align: center; padding: 0 20px;
  }
  .coming-soon .icon { font-size: 48px; margin-bottom: 16px; }
  .coming-soon h2 { font-size: 22px; color: var(--text-bright); margin-bottom: 8px; }
  .coming-soon p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
</style>
</head>
<body>
<header>
  <div>
    <a href="../index.html" class="back">← voltar</a>
    <h1>Flashcards — Processos de Fabrico II</h1>
    <p>⚙️ Em construção</p>
  </div>
</header>
<div class="coming-soon">
  <div class="icon">🃏</div>
  <h2>Em breve</h2>
  <p>Os flashcards de Processos de Fabrico II estão a ser preparados. Volta em breve!</p>
</div>
</body>
</html>
