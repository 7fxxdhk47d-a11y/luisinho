<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guia de Resolução — Transferência de Calor</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-bright: #f0f6fc;
    --text-muted: #8b949e;
    --text-mid: #adbac7;
  }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }

  header {
    background: linear-gradient(135deg, #161b22 0%, #1a1f2b 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 28px;
    text-align: center;
  }

  header h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 0.5px;
  }

  header p {
    margin-top: 8px;
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
  }

  #topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
    padding: 20px 16px;
    max-width: 960px;
    margin: 0 auto;
  }

  .topic-btn {
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    transition: all 0.2s ease;
    width: 100%;
    font-family: inherit;
  }

  .topic-btn:hover {
    background: var(--bg3);
    border-color: #484f58;
  }

  .topic-btn.active {
    background: var(--bg3);
  }

  .topic-btn .icon { font-size: 24px; flex-shrink: 0; }

  .topic-btn .label {
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
  }

  .topic-btn.active .label { color: var(--text-bright); }

  #content {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  #empty-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .tip-box {
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 13.5px;
    line-height: 1.6;
    color: #e6edf3;
  }

  .tip-box strong { font-weight: 700; }

  .steps { display: flex; flex-direction: column; gap: 10px; }

  .step-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .step-header {
    width: 100%;
    background: none;
    border: none;
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    text-align: left;
    font-family: inherit;
  }

  .step-num {
    color: #fff;
    font-weight: 800;
    font-size: 13px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .step-title {
    color: var(--text-bright);
    font-size: 14.5px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
  }

  .step-arrow {
    color: var(--text-muted);
    font-size: 18px;
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-top: 2px;
    display: inline-block;
  }

  .step-arrow.open { transform: rotate(180deg); }

  .step-detail {
    padding: 0 18px 16px 60px;
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text-mid);
    white-space: pre-line;
    font-family: 'EB Garamond', Georgia, serif;
    display: none;
  }

  .step-detail.open { display: block; }

  .summary-box {
    margin-top: 28px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }

  .summary-box h3 {
    margin-bottom: 10px;
    font-size: 14px;
    font-weight: 700;
  }

  .summary-text {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-muted);
  }

  .summary-text span { color: var(--text-bright); }

  @media (max-width: 600px) {
    header h1 { font-size: 20px; }
    .step-detail { padding-left: 44px; }
  }
</style>
</head>

      },
    ],
    tip: "Para gases perfeitos β = 1/T(K). CUIDADO com a orientação da placa horizontal: quente para cima ≠ quente para baixo → correlações diferentes!",
    summary: `<span>Propriedades a Tf</span> → β (1/T para gases) → <span>Ra = Gr·Pr</span> → Geometria e orientação → <span>Correlação Nu</span> → h = Nu·k/Lc → Q̇ → <span>Iterar se Ts desconhecido</span>`,
  },
];

let activeTopic = null;
let expandedStep = null;

function render() {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';
  topics.forEach(topic => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (activeTopic === topic.id ? ' active' : '');
    if (activeTopic === topic.id) {
      btn.style.borderColor = topic.color;
      btn.style.boxShadow = `0 0 12px ${topic.color}33`;
    }
    btn.innerHTML = `<span class="icon">${topic.icon}</span><span class="label">${topic.title}</span>`;
    btn.onclick = () => {
      activeTopic = activeTopic === topic.id ? null : topic.id;
      expandedStep = null;
      render();
    };
    grid.appendChild(btn);
  });

  const emptyMsg = document.getElementById('empty-msg');
  const contentDiv = document.getElementById('topic-content');

  if (!activeTopic) {
    emptyMsg.style.display = 'block';
    contentDiv.style.display = 'none';
    return;
  }

  emptyMsg.style.display = 'none';
  contentDiv.style.display = 'block';

  const topic = topics.find(t => t.id === activeTopic);

  let html = `
    <div class="tip-box" style="background:${topic.color}15;border:1px solid ${topic.color}44">
      <strong style="color:${topic.color}">💡 Dica-chave:</strong> ${topic.tip}
    </div>
    <div class="steps">
  `;

  topic.steps.forEach((step, idx) => {
    const isOpen = expandedStep === idx;
    html += `
      <div class="step-card" style="${isOpen ? `border-color:${topic.color}88` : ''}">
        <button class="step-header" onclick="toggleStep(${idx})">
          <span class="step-num" style="background:${topic.color}">${idx + 1}</span>
          <span class="step-title">${step.title}</span>
          <span class="step-arrow ${isOpen ? 'open' : ''}">▾</span>
        </button>
        <div class="step-detail ${isOpen ? 'open' : ''}">${step.detail}</div>
      </div>
    `;
  });

  html += `</div>
    <div class="summary-box">
      <h3 style="color:${topic.color}">Resumo do fluxo de resolução</h3>
      <div class="summary-text">${topic.summary}</div>
    </div>
  `;

  contentDiv.innerHTML = html;
}

function toggleStep(idx) {
  expandedStep = expandedStep === idx ? null : idx;
  render();
}

render();
</script>
</body>
</html>
