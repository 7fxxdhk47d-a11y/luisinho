<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luís Oliveira — Engenharia</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --text: #c9d1d9; --text-bright: #f0f6fc; --text-muted: #8b949e;
  }
  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #161b22 0%, #1a1f2b 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 24px 32px; text-align: center;
  }
  header h1 { font-size: 30px; font-weight: 700; color: var(--text-bright); }
  header p { margin-top: 8px; font-size: 15px; color: var(--text-muted); font-style: italic; }

  main {
    max-width: 900px; margin: 40px auto; padding: 0 20px 60px;
  }

  .section-label {
    font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 16px;
  }

  .cadeiras { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }

  .cadeira-card {
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    text-decoration: none;
    display: block;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .cadeira-card:hover {
    background: var(--bg3);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .cadeira-card:hover { border-color: #484f58; }

  .card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .card-icon { font-size: 28px; }
  .card-title { font-size: 17px; font-weight: 700; color: var(--text-bright); line-height: 1.3; }
  .card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }

  .card-links { display: flex; flex-direction: column; gap: 8px; }
  .card-link {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    text-decoration: none; color: var(--text);
    font-size: 13px; font-weight: 600;
    transition: all 0.15s;
  }
  .card-link:hover { border-color: #484f58; color: var(--text-bright); }
  .card-link .link-icon { font-size: 16px; }
  .card-link .link-arrow { margin-left: auto; color: var(--text-muted); font-size: 14px; }

  .card-link.disabled {
    opacity: 0.4; cursor: default; pointer-events: none;
  }

  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 20px;
    font-weight: 600; margin-left: 6px;
  }
  .badge-soon { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
  .badge-new { background: #1a3a1a; color: #4caf50; border: 1px solid #2d5a2d; }

  .accent-tc { border-top: 3px solid #c0392b; }
  .accent-pf { border-top: 3px solid #2980b9; }
</style>
</head>
<body>

<header>
  <h1>Luís Oliveira</h1>
  <p>Recursos de estudo — L.EM 25/26</p>
</header>

<main>
  <p class="section-label">Cadeiras</p>
  <div class="cadeiras">

    <!-- Transferência de Calor -->
    <div class="cadeira-card accent-tc">
      <div class="card-top">
        <span class="card-icon">🔥</span>
        <span class="card-title">Transferência de Calor</span>
      </div>
      <p class="card-desc">Guias de resolução, formulários e recursos de estudo para TC.</p>
      <div class="card-links">
        <a href="tc/guia.html" class="card-link">
          <span class="link-icon">📋</span>
          Guia de Resolução
          <span class="badge badge-new">novo</span>
          <span class="link-arrow">→</span>
        </a>
      </div>
    </div>

  </div>
</main>

</body>
</html>
